<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Game Portal</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        .game-card { background: #333; padding: 15px; border-radius: 10px; cursor: pointer; text-decoration: none; color: white; display: block; }
        .game-card img { width: 50px; height: 50px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🎮 ゲームポータル</h1>
    <div class="grid" id="game-list"></div>

    <script>
        const games = [
            { name: "2048", img: "https://play2048.co/favicon.ico", url: "https://play2048.co/" },
            { name: "Tetris", img: "https://tetris.com/images/pages/web/tetris-logo-main.png", url: "https://tetris.com/play-tetris" },
            { name: "Snake", img: "https://playsnake.org/favicon.ico", url: "https://playsnake.org/" },
            { name: "Pacman", img: "https://www.google.com/logos/2010/pacman10-i.png", url: "https://www.google.com/logos/2010/pacman10-i.html" },
            { name: "Flappy Bird", img: "https://flappybird.io/favicon.ico", url: "https://flappybird.io/" },
            { name: "Chrome Dino", img: "https://chromedino.com/assets/favicon.png", url: "https://chromedino.com/" },
            { name: "Breakout", img: "https://elgoog.im/breakout/favicon.png", url: "https://elgoog.im/breakout/" },
            { name: "Minesweeper", img: "https://minesweepergame.com/favicon.ico", url: "https://minesweepergame.com/play/" },
            { name: "Solitaire", img: "https://solitaire-web.com/favicon.ico", url: "https://solitaire-web.com/" },
            { name: "Pong", img: "https://pong-2.com/favicon.ico", url: "https://pong-2.com/" }
        ];

        const list = document.getElementById('game-list');
        games.forEach(g => {
            list.innerHTML += `<a href="${g.url}" target="_blank" class="game-card">
                <img src="${g.img}" onerror="this.src='https://via.placeholder.com/50'">
                <p>${g.name}</p>
            </a>`;
        });
    </script>
</body>
</html>
