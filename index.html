<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Game Portal</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        .game-card { text-decoration: none; color: white; text-align: center; }
        .game-card img { width: 100px; height: 100px; border-radius: 15px; }
    </style>
</head>
<body>
    <h1>🎮 GAME PORTAL</h1>
    <div class="grid" id="game-list"></div>

    <script>
        // ここにゲームデータを入れます
        const games = [
            { img: "https://play2048.co/favicon.ico", url: "https://play2048.co/" },
            { img: "https://tetris.com/images/pages/web/tetris-logo-main.png", url: "https://tetris.com/play-tetris" }
        ];

        // 画面に表示する処理
        const container = document.getElementById('game-list');
        games.forEach(function(g) {
            container.innerHTML += '<a href="' + g.url + '" target="_blank" class="game-card"><img src="' + g.img + '" onerror="this.src=\'https://via.placeholder.com/100\'"></a>';
        });
    </script>
</body>
</html>
